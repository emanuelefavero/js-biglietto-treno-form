<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calcola il prezzo stimato del biglietto del treno in base alla tratta selezionata e all'età del passeggero."
    />
    <meta
      name="keywords"
      content="biglietto treno, prezzo biglietto, preventivo treno, tratta, età, sconto"
    />
    <meta name="author" content="Emanuele Favero" />
    <title>Railline | Calcola prezzo biglietto</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- JS -->
    <script defer src="assets/js/data.js"></script>
    <script defer src="assets/js/utils.js"></script>
    <script defer src="assets/js/templates.js"></script>
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-labelledby="page-title">
        <!-- Intro -->
        <p class="brand">
          <img
            class="brand-logo"
            src="assets/img/logo.png"
            alt="Rail line"
            width="1031"
            height="190"
            draggable="false"
          />
        </p>
        <h1 id="page-title">Scopri il prezzo del tuo viaggio</h1>
        <p class="intro">
          Scegli la tratta, inserisci l'età e scopri il prezzo stimato.
        </p>

        <!-- Form -->
        <form class="form" novalidate>
          <div class="field">
            <label for="route">Tratta</label>
            <select id="route" name="route" required>
              <option value="">Scegli una tratta</option>
              <!-- Options are rendered dynamically with JavaScript -->
            </select>
          </div>

          <div class="field">
            <label for="age">Età del passeggero</label>
            <input
              type="number"
              id="age"
              name="age"
              min="1"
              max="120"
              step="1"
              required
              placeholder="Età"
            />
          </div>

          <button class="button" type="submit">Calcola preventivo</button>
        </form>

        <!-- Error Message -->
        <p class="error" id="error-message" role="alert"></p>
      </section>

      <!-- Ticket -->
      <div class="ticket-stage">
        <div class="printer-slot" aria-hidden="true"></div>
        <div class="ticket-viewport">
          <section class="ticket" id="result" aria-live="polite"></section>
        </div>
      </div>
    </main>
  </body>
</html>
