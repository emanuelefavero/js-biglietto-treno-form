<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Boolean Rail | Biglietto treno</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script defer src="assets/js/utils.js"></script>
    <script defer src="assets/js/templates.js"></script>
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-labelledby="page-title">
        <p class="brand">Boolean Rail</p>
        <h1 id="page-title">Calcola il tuo biglietto</h1>
        <p class="intro">
          Inserisci i dati del passeggero e genera il riepilogo del viaggio.
        </p>

        <form class="form" novalidate>
          <div class="field">
            <label for="km">Chilometri da percorrere</label>
            <input
              type="number"
              id="km"
              name="km"
              min="1"
              max="5000"
              step="1"
              required
              placeholder="Km"
            />
          </div>

          <div class="field">
            <label for="age">Età del passeggero</label>
            <input
              type="number"
              id="age"
              name="age"
              min="1"
              max="120"
              step="1"
              required
              placeholder="Età"
            />
          </div>

          <button class="button" type="submit">Calcola prezzo</button>
        </form>

        <p class="error" id="error-message" role="alert"></p>
      </section>

      <section class="ticket" id="result" aria-live="polite"></section>
    </main>
  </body>
</html>
