<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>JS Biglietto Treno Form</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script defer src="assets/js/utils.js"></script>
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <h1>JS Biglietto Treno Form</h1>

    <form novalidate>
      <label for="km">Chilometri da percorrere</label>
      <input
        type="number"
        id="km"
        name="km"
        min="1"
        step="1"
        required
        placeholder="Km"
      />

      <label for="age">Età del passeggero</label>
      <input
        type="number"
        id="age"
        name="age"
        min="1"
        max="120"
        step="1"
        required
        placeholder="Età"
      />
      <button type="submit">Calcola prezzo</button>
    </form>

    <p id="error-message" role="alert"></p>

    <section id="result" hidden></section>
  </body>
</html>
